<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Astryx</title>

    <link href="https://fonts.googleapis.com/css2?family=Genos&family=Inter&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="header.css">
</head>
<body>
    <header>
        <nav class="header-nav">
            <a class="logo" href="index.html">Astryx</a>

            <ul class="nav-links" id="navLinks">
                <a href="../index.html" target="_blank">Főoldal</a>
                <a href="../Dominik/programok.html" target="_blank">Programok</a>
                <a href="../Abel/pages/tickets.html" target="_blank">Jegyek</a>
                <a href="../Abel/pages/galery.html" target="_blank">Galéria</a>
                <a href="../Balazs/rolunk.html" target="_blank">Rólunk</a>
                <a href="../Balazs/kapcsolatok.html" target="_blank">Kapcsolat</a>
            </ul>

            <div class="nav-right">
                <button class="jegy-gomb" type="button">Jegyvásárlás</button>
                <button class="hamburger" id="hamburgerBtn" type="button">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </nav>
    </header>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const hamburgerBtn = document.getElementById('hamburgerBtn');
            const navLinks = document.getElementById('navLinks');

            if (hamburgerBtn && navLinks) {
                hamburgerBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    navLinks.classList.toggle('active');
                });

                // Menü bezárása link kattintáskor
                const links = navLinks.querySelectorAll('a');
                links.forEach(link => {
                    link.addEventListener('click', function() {
                        navLinks.classList.remove('active');
                    });
                });
            }
        });
    </script>
</body>
</html>
